<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Nirma sRegistration Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:600px;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#003366;
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        textarea{
            resize:vertical;
        }

        .gender{
            display:flex;
            gap:20px;
        }

        .gender label{
            font-weight:normal;
        }

        .buttons{
            text-align:center;
            margin-top:20px;
        }

        button{
            padding:10px 25px;
            margin:5px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .submit{
            background:#28a745;
            color:white;
        }

        .reset{
            background:#dc3545;
            color:white;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Student Registration Form</h2>

    <form action="#" method="post">

        <div class="form-group">
            <label>Student Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Enrollment Number</label>
            <input type="text" name="enrollment" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" name="mobile" pattern="[0-9]{10}" placeholder="10-digit mobile number" required>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" required>
        </div>

        <div class="form-group">
            <label>Gender</label>

            <div class="gender">
                <label><input type="radio" name="gender" value="Male"> Male</label>

                <label><input type="radio" name="gender" value="Female"> Female</label>

                <label><input type="radio" name="gender" value="Other"> Other</label>
            </div>
        </div>

        <div class="form-group">
            <label>Course</label>

            <select name="course" required>
                <option value="">--Select Course--</option>
                <option>B.Tech Computer Engineering</option>
                <option>B.Tech Information Technology</option>
                <option>BCA</option>
                <option>MCA</option>
                <option>M.Tech</option>
            </select>
        </div>

        <div class="form-group">
            <label>Semester</label>

            <select name="semester" required>
                <option value="">--Select Semester--</option>
                <option>Semester 1</option>
                <option>Semester 2</option>
                <option>Semester 3</option>
                <option>Semester 4</option>
                <option>Semester 5</option>
                <option>Semester 6</option>
                <option>Semester 7</option>
                <option>Semester 8</option>
            </select>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea rows="4"></textarea>
        </div>

        <div class="buttons">
            <button type="submit" class="submit">Register</button>
            <button type="reset" class="reset">Reset</button>
        </div>

    </form>

</div>

</body>
</html>
